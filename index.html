<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Handicap RPS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SCREEN 1 -->
<div id="screen1" class="screen">

<h2>Choose Rounds</h2>

<div class="roundRow">
<span>Player 1</span>
<button onclick="changeRound('p1',-1)">-</button>
<span id="p1Rounds">5</span>
<button onclick="changeRound('p1',1)">+</button>
</div>

<div class="roundRow">
<span>Player 2</span>
<button onclick="changeRound('p2',-1)">-</button>
<span id="p2Rounds">5</span>
<button onclick="changeRound('p2',1)">+</button>
</div>

<button class="bigButton" onclick="startSelection()">START</button>

</div>


<!-- SCREEN 2A -->
<div id="screen2a" class="screen">

<h2>Player 1 – Choose Moves</h2>

<div id="p1Grid"></div>

<button class="bigButton" onclick="confirmP1()">CONFIRM</button>

</div>


<!-- PASS PHONE -->
<div id="passPhone" class="screen">

<h2>PASS THE PHONE</h2>
<p>Give the phone to Player 2</p>

<button class="bigButton" onclick="showScreen('screen2b')">READY</button>

</div>


<!-- SCREEN 2B -->
<div id="screen2b" class="screen">

<h2>Player 2 – Choose Moves</h2>

<div id="p2Grid"></div>

<button class="bigButton" onclick="startBattle()">CONFIRM</button>

</div>


<!-- SCREEN 3 -->
<div id="screen3" class="screen">

<h2>Battle</h2>

<table id="resultTable"></table>

<div id="finalScore"></div>

<button class="bigButton" onclick="restart()">PLAY AGAIN</button>

</div>


<script src="script.js"></script>

</body>
</html>
